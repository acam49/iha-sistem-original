<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tulpar Savunma - Personel Yönetimi</title>
    <link rel="stylesheet" href="style_personel.css">
</head>
<body>
    <div class="app-container">
        
        <aside class="sidebar">
            <div class="logo-area">
                <h1>TULPAR</h1>
                <p>SAVUNMA SİSTEMLERİ</p>
                <span class="v-tag">v1.0</span>
            </div>
            
            <nav class="nav-links">
                <ul>
                    <li><a href="../anasayfa/dashboard.html" style="text-decoration: none; color: inherit; display: block; height: 100%; width: 100%;">Ana Panel</a></li>
                    <li><a href="../envanter&stok/envanter.html" style="text-decoration: none; color: inherit; display: block; height: 100%; width: 100%;">Envanter & Stok</a></li>
                    <li><a href="../gorev/gorev_planlama.html" style="text-decoration: none; color: inherit; display: block; height: 100%; width: 100%;">Görev Planlama</a></li>
                    <li><a href="../bakım/bakim_loglari.html" style="text-decoration: none; color: inherit; display: block; height: 100%; width: 100%;">Bakım & Uçuş Logları</a></li>
                    <li class="active"><a href="../personel/personel_yonetimi.html" style="text-decoration: none; color: inherit; display: block; height: 100%; width: 100%;">Personel Yönetimi</a></li>
                </ul>
            </nav>

            <div class="sidebar-bottom">
                <a href="../../logout.php" style="text-decoration: none; color: inherit; display: block;"><div class="exit-btn">Sistemden Çıkış Yap</div></a>
            </div>
        </aside>

        <main class="main-content">
            
            <div class="left-forms">
                
                <div class="glass-panel">
                    <h3 class="panel-title">YENİ PERSONEL</h3>
                    <form id="ekleForm" class="task-form">
                        <input type="text" id="yeniId" placeholder="ID (10 Hane)" required>
                        <input type="text" id="yeniAd" placeholder="Ad" required>
                        <input type="text" id="yeniSoyad" placeholder="Soyad" required>
                        <input type="tel" id="yeniTelefon" placeholder="Telefon Numarası" required>
                        <input type="email" id="yeniEposta" placeholder="E-posta Adresi" required>
                        
                        <input type="password" id="yeniSifre" placeholder="Şifre" required>
                        <select id="yeniYetki" required>
                            <option value="Admin">Admin</option>
                            <option value="Yönetici">Yönetici</option>
                            <option value="Muhasebeci">Muhasebeci</option>
                            <option value="İşçi">İşçi</option>
                            <option value="Personel" selected>Personel</option>
                        </select>
                        <button type="submit" class="btn btn-dark">Kaydet</button>
                    </form>
                </div>

                <div class="glass-panel">
                    <h3 class="panel-title">BİLGİ GÜNCELLE</h3>
                    <form id="guncelleForm" class="task-form">
                        <input type="text" id="gMevcutId" placeholder="Mevcut ID Giriniz" required>
                        <input type="text" id="gYeniId" placeholder="Yeni ID (Opsiyonel)">
                        <input type="text" id="gYeniAd" placeholder="Yeni Ad (Opsiyonel)">
                        <input type="text" id="gYeniSoyad" placeholder="Yeni Soyad (Opsiyonel)">
                        <input type="tel" id="gYeniTelefon" placeholder="Yeni Telefon (Opsiyonel)">
                        <input type="email" id="gYeniEposta" placeholder="Yeni E-posta (Opsiyonel)">
                        
                        <select id="gYeniYetki">
                            <option value="">Rütbe Değiştir (Opsiyonel)</option>
                            <option value="Admin">Admin</option>
                            <option value="Yönetici">Yönetici</option>
                            <option value="Muhasebeci">Muhasebeci</option>
                            <option value="İşçi">İşçi</option>
                            <option value="Personel">Personel</option>
                        </select>
                        <p class="form-info">Lütfen değiştirmek istediğiniz alanları doldurunuz.</p>
                        <button type="submit" class="btn btn-cyan">Verileri Yenile</button>
                    </form>
                </div>

            </div>

            <div class="glass-panel">
                <h3 class="panel-title">PERSONEL LİSTESİ</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Ad Soyad</th>
                            <th>ID</th>
                            <th>Telefon</th>
                            <th>E-posta</th>
                            <th>Yetki</th>
                            <th>İşlem</th>
                        </tr>
                    </thead>
                    <tbody id="personelTablosu">
                        <!-- Veriler veritabanından dinamik olarak yüklenecek -->
                    </tbody>
                </table>
            </div>

        </main>
    </div>

    <script>
        // Sayfa yüklenince personelleri DB'den çek
        function personelleriYukle() {
            fetch('../../api/personel_getir.php')
                .then(r => r.json())
                .then(data => {
                    if (data.error) {
                        if (data.error === 'Unauthorized') window.location.replace('../../index.html');
                        return;
                    }
                    const tbody = document.getElementById('personelTablosu');
                    tbody.innerHTML = '';
                    if (!data.personeller || data.personeller.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#888;">Burası boş...</td></tr>';
                    } else {
                        data.personeller.forEach(p => {
                            let adSoyad = (p.Ad + ' ' + p.Soyad).toUpperCase();
                            let yetkiCss = yetkiClassBul(p.Rol);
                            let tr = document.createElement('tr');
                            tr.setAttribute('data-id', p.PERSONEL_ID);
                            tr.innerHTML = `
                                <td class="td-isim">${adSoyad}</td>
                                <td class="td-id">${p.PERSONEL_ID}</td>
                                <td class="td-telefon">${p.Telefon || '-'}</td>
                                <td class="td-eposta">${p.Eposta}</td>
                                <td class="td-yetki"><span class="badge ${yetkiCss}">${p.Rol}</span></td>
                                <td><button class="btn-red" onclick="personelSil('${p.PERSONEL_ID}')">Sil</button></td>
                            `;
                            tbody.appendChild(tr);
                        });
                    }
                })
                .catch(err => console.error('Personel verileri yüklenemedi:', err));
        }

        window.addEventListener('DOMContentLoaded', personelleriYukle);

        // Yetki ismine göre doğru CSS sınıfını döndüren fonksiyon
        function yetkiClassBul(yetki) {
            switch(yetki) {
                case "Admin": return "b-admin";
                case "Yönetici": return "b-yonetici";
                case "Muhasebeci": return "b-muhasebeci";
                case "İşçi": return "b-isci";
                case "Personel": return "b-personel";
                default: return "b-personel";
            }
        }

        // --- YENİ PERSONEL EKLEME ---
        document.getElementById('ekleForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let id = document.getElementById('yeniId').value.trim();
            let ad = document.getElementById('yeniAd').value.trim();
            let soyad = document.getElementById('yeniSoyad').value.trim();
            let telefon = document.getElementById('yeniTelefon').value.trim();
            let eposta = document.getElementById('yeniEposta').value.trim();
            let sifre = document.getElementById('yeniSifre').value;
            let yetki = document.getElementById('yeniYetki').value;

            const formData = new FormData();
            formData.append('id', id);
            formData.append('ad', ad);
            formData.append('soyad', soyad);
            formData.append('telefon', telefon);
            formData.append('eposta', eposta);
            formData.append('sifre', sifre);
            formData.append('yetki', yetki);

            fetch('../../api/personel_ekle.php', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('Hata: ' + data.error);
                } else {
                    alert(data.message);
                    document.getElementById('ekleForm').reset();
                    personelleriYukle();
                }
            })
            .catch(err => {
                console.error(err);
                alert('Personel kaydedilirken ağ hatası oluştu.');
            });
        });

        // --- BİLGİ GÜNCELLEME ---
        document.getElementById('guncelleForm').addEventListener('submit', function(e) {
            e.preventDefault();

            let mevcutId = document.getElementById('gMevcutId').value.trim();
            let yeniId = document.getElementById('gYeniId').value.trim();
            let yeniAd = document.getElementById('gYeniAd').value.trim();
            let yeniSoyad = document.getElementById('gYeniSoyad').value.trim();
            let yeniTelefon = document.getElementById('gYeniTelefon').value.trim();
            let yeniEposta = document.getElementById('gYeniEposta').value.trim();
            let yeniYetki = document.getElementById('gYeniYetki').value;

            const formData = new FormData();
            formData.append('mevcutId', mevcutId);
            formData.append('yeniId', yeniId);
            formData.append('ad', yeniAd);
            formData.append('soyad', yeniSoyad);
            formData.append('telefon', yeniTelefon);
            formData.append('eposta', yeniEposta);
            formData.append('yetki', yeniYetki);

            fetch('../../api/personel_guncelle.php', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.error) {
                    alert('Hata: ' + data.error);
                } else {
                    alert(data.message);
                    document.getElementById('guncelleForm').reset();
                    personelleriYukle();
                }
            })
            .catch(err => {
                console.error(err);
                alert('Personel bilgileri güncellenirken ağ hatası oluştu.');
            });
        });

        // --- PERSONEL SİLME ---
        function personelSil(id) {
            if(confirm("Bu personeli sistemden silmek istediğinize emin misiniz?")) {
                const formData = new FormData();
                formData.append('id', id);

                fetch('../../api/personel_sil.php', {
                    method: 'POST',
                    body: formData
                })
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        alert('Hata: ' + data.error);
                    } else {
                        alert(data.message);
                        personelleriYukle();
                    }
                })
                .catch(err => {
                    console.error(err);
                    alert('Personel silinirken ağ hatası oluştu.');
                });
            }
        }
    </script>
</body>
</html>
